<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
<form method="post" th:action="@{/register}" th:object="${user}">
    <input placeholder="username" th:field="${user.username}" type="text">
    <input placeholder="password" th:field="${user.password}" type="password">
    <button type="submit">create</button>
</form>
</body>
</html>
